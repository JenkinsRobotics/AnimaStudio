name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  swift-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build and test Anima Studio
        working-directory: studio
        run: swift test

  python-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest anima_core/tests -q
