# linkage.yaml — a parametric_feature template (anima_feature 1.0).
# An N-link serial revolute arm in the Onshape custom-feature spirit:
# the repeat block unrolls one part + one revolute joint per link, the
# ${...} expressions derive names and limits from the parameters, and
# the boolean end_slider parameter adds an optional prismatic end
# joint by repeating its block 0 or 1 times. Everything the body emits
# is a standard character-format primitive — the loader validates the
# merged result.

anima_feature: "1.0"
name: "Serial revolute linkage"
description: >-
  A chain of N links joined by revolute pivots with symmetric per-joint
  limits, optionally ending in a prismatic slider.

parameters:
  - name: links
    kind: int
    default: 3
    min: 2
    max: 8
    description: "Number of moving links in the chain"
  - name: joint_limit_deg
    kind: float
    unit: deg
    default: 90
    min: 5
    max: 180
    description: "Symmetric rotation limit of every pivot"
  - name: end_slider
    kind: bool
    default: false
    description: "Add a prismatic slider joint at the end of the chain"
  - name: slider_orientation
    kind: choice
    choices: [lengthwise, crosswise]
    default: lengthwise
    description: "How the optional end slider is oriented"

body:
  # link_0 is the fixed base of the chain; $parent attaches it to the
  # rig part chosen at insertion (or it becomes a root part).
  parts:
    link_0:
      parent: $parent
      description: "Linkage base"
  repeat:
    # One moving link + one revolute pivot per iteration (i = 0..N-1).
    - count: ${links}
      var: i
      body:
        parts:
          "link_${i + 1}": {}
        joints:
          "pivot_${i + 1}":
            type: revolute
            parent: "link_${i}"
            child: "link_${i + 1}"
            dofs:
              rotation:
                limits:
                  min_deg: ${-joint_limit_deg}
                  max_deg: ${joint_limit_deg}
                neutral_deg: 0
                axis: [0, 1, 0]
    # A bool repeat count is 0 or 1: the end slider is optional.
    - count: ${end_slider}
      var: s
      body:
        parts:
          end_effector: {}
        joints:
          end_slide:
            type: prismatic
            parent: "link_${links}"
            child: end_effector
            dofs:
              travel:
                limits: { min_m: 0, max_m: 0.05 }
                neutral_m: 0
                description: "End slider, ${slider_orientation}"
