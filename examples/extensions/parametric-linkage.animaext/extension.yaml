# extension.yaml — the one copy of this extension's truth.
# The first packaged parametric_feature example (Extensions.md packet
# E2): a declarative N-link serial revolute linkage template. Pure
# data — the entry is a YAML template, no Python, so the bundle needs
# no capabilities at all.

anima_extension: "1.0"
id: "parametric-linkage"
name: "Parametric Linkage"
version: "0.1.0"
author: "Anima examples"
license: "Apache-2.0"
description: "N-link serial revolute arm feature with an optional end slider."
compatibility:
  anima_format: "2.0"
requires: []
capabilities: []
provides:
  - kind: parametric_feature
    id: "serial_linkage"
    entry: "linkage.yaml"
assets: []
