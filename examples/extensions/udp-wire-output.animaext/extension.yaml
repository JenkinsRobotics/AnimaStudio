# extension.yaml — the one copy of this extension's truth.
# The first real packaged .animaext example (Extensions.md packet E1):
# an output_adapter streaming Anima Wire Protocol v0 lines as UDP
# datagrams, one line per datagram, no trailing newline.

anima_extension: "1.0"
id: "udp-wire-output"
name: "UDP Wire Output"
version: "0.1.0"
author: "Anima examples"
license: "Apache-2.0"
description: "Streams Anima Wire Protocol frames over UDP datagrams."
compatibility:
  anima_format: "2.0"
requires: []
capabilities: [network]
provides:
  - kind: output_adapter
    id: "udp_wire"
    entry: "adapter.py:UdpWireOutput"
    config:
      host: "127.0.0.1"
      port: 9600
assets: []
