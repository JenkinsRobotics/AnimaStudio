name: AnimaStudio

options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  AnimaStudioPackage:
    path: .

targets:
  Anima Studio:
    type: application
    platform: macOS
    productName: Anima Studio
    sources:
      - path: App
        excludes:
          - AnimaCoreHelper.entitlements
          - AnimaStudio.entitlements
          - Resources/AppIconSource.svg
    dependencies:
      - package: AnimaStudioPackage
        product: AnimaStudioUI
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.animastudio.studio
        PRODUCT_NAME: Anima Studio
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_ENTITLEMENTS: App/AnimaStudio.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Anima Studio
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.graphics-design
        INFOPLIST_KEY_NSDocumentsFolderUsageDescription: Anima Studio creates and manages project folders in Documents/AnimaStudio.
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES

  AnimaStudioAppUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: AppUITests
    dependencies:
      - target: Anima Studio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.animastudio.studio.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  AnimaStudio:
    build:
      targets:
        Anima Studio: all
        AnimaStudioAppUITests:
          - test
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: AnimaStudioAppUITests
          parallelizable: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
